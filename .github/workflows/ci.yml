name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Run example scenarios
        run: |
          go build -o bin/paywall-sandbox ./cmd/paywall-sandbox
          ./bin/paywall-sandbox test examples/scenario.json
          ./bin/paywall-sandbox test examples/scenario-hmac.json

      - name: Gofmt check
        run: |
          diff <(gofmt -l .) <(echo -n "")

      - name: Validate goreleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
